analyzer_rules:
  - unused_declaration

opt_in_rules:
  - empty_count
  - force_unwrapping
  - force_cast
  - vertical_whitespace
  - first_where
  - contains_over_filter_is_empty
  - discouraged_optional_boolean
  - closure_spacing
  - prefer_self_in_static_references
  - shorthand_optional_binding
  - todo
  - cyclomatic_complexity
  - large_tuple
  - prefixed_toplevel_constant
  - anonymous_argument_in_multiline_closure
  - closure_end_indentation
  - implicit_return
  - last_where
  - modifier_order
  - overridden_super_call
  - toggle_bool
  - redundant_nil_coalescing

included:
  - TeymiaHabit
excluded:
  - Pods
  - DerivedData
  - ./*/Packages

disabled_rules:
  - identifier_name
  - multiple_closures_with_trailing_closure
  - implicit_optional_initialization
  - explicit_acl
  - trailing_newline

type_name:
  min_length: 2
  excluded:
    - DS

function_parameter_count:
  warning: 6
  error: 10

line_length:
  warning: 120
  error: 160

function_body_length:
  warning: 60
  error: 100

file_length:
  warning: 400
  error: 500

nesting:
  type_level: 3

cyclomatic_complexity:
  warning: 12
  error: 20

opening_brace:
  severity: warning

empty_count:
  severity: warning

statement_position:
  severity: warning

redundant_nil_coalescing:
  severity: warning

# Custom Rules
custom_rules:
  swiftdata_force_unwrap:
    name: "SwiftData force unwrap"
    regex: '@Model\s+class.*\n.*\n.*!'
    message: "In SwiftData models, avoid force unwrap, use optional with default value"
    severity: warning
    
  unnecessary_foundation_import:
    name: "Unnecessary Foundation import"
    regex: 'import Foundation\s*\n(?=.*import SwiftUI)'
    message: "Foundation is re-exported by SwiftUI. Remove this import."
    severity: warning
  
  swiftui_in_business_logic:
    name: "SwiftUI in Business Logic"
    regex: '^(class|struct)\s+\w*(Manager|Service|Repository|UseCase|Interactor|Presenter).*\n(.*\n)*?import SwiftUI'
    message: "Business logic components should not import SwiftUI"
    severity: error
