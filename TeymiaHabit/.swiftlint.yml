excluded:
  - Pods
  - DerivedData

disabled_rules:
  - trailing_whitespace
  - implicit_optional_initialization # for CloudKit
  - identifier_name
  - multiple_closures_with_trailing_closure

type_name:
  min_length: 2
  excluded:
    - DS

# SwiftData
function_parameter_count:
  warning: 12
  error: 20

line_length:
  warning: 160
  error: 200
